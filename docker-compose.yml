version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    container_name: lms-app
    depends_on:
      - db
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/lms_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_lms_secret_321
      PORT: 3000
    restart: unless-stopped

volumes:
  db_data:
